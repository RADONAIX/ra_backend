# RADONAIX — nginx: serves the built UI (SPA) AND proxies /api to the backend,
# so everything lives on a single HTTPS origin (no separate :8080 / :8000, no CORS).
#
#   https://10.200.36.156/         -> built UI (static files)
#   https://10.200.36.156/api/...  -> gunicorn backend
#
# Bare VM : upstream = 127.0.0.1:8000 ; deploy the UI build to /var/www/radonaix.
# Docker  : upstream = api:8000 ; mount the built dist into the nginx container
#           at /var/www/radonaix (the UI repo produces it via `npm run build`).
#
# TLS: self-signed via deploy/gen-selfsigned-cert.sh, or certbot for a real domain.

upstream radonaix_api {
    server 127.0.0.1:8000;   # Docker: change to  server api:8000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name 10.200.36.156;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name 10.200.36.156;

    ssl_certificate     /etc/nginx/certs/radonaix.crt;   # your cert
    ssl_certificate_key /etc/nginx/certs/radonaix.key;   # your key
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Where the built UI (npm run build -> dist/) is deployed.
    root /var/www/radonaix;
    index index.html;

    client_max_body_size 10m;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # --- Backend API (keep the /api prefix — note: NO trailing slash on proxy_pass) ---
    location /api/ {
        proxy_pass http://radonaix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;        # stream large report downloads
        proxy_read_timeout 300s;
    }

    # --- Hashed static assets (Vite build) — cache hard ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # --- SPA fallback: any other path serves index.html (client-side routing) ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
