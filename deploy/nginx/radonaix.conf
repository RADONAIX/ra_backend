# RADONAIX backend — nginx TLS reverse proxy.
#
# Bare VM (Track B): place in /etc/nginx/sites-available/, symlink to
#   sites-enabled/, set `upstream` to 127.0.0.1:8000, `nginx -t && systemctl reload nginx`.
# Docker (Track A): mounted into the nginx service; set `upstream` to api:8000.
#
# TLS certs: drop in a client-provided cert, or use certbot (Let's Encrypt):
#   certbot --nginx -d ra.example.com
# and it will manage the ssl_certificate lines for you.

upstream radonaix_api {
    # Bare VM:  server 127.0.0.1:8000;
    # Docker:   server api:8000;
    server 127.0.0.1:8000;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name ra.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name ra.example.com;

    ssl_certificate     /etc/nginx/certs/radonaix.crt;   # <- your cert
    ssl_certificate_key /etc/nginx/certs/radonaix.key;   # <- your key
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Security headers (defence-in-depth; API also sets its own envelope).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Bulk-export downloads can be large; don't buffer them to disk and allow
    # big responses. Uploads are small (JSON), so cap the request body.
    client_max_body_size 10m;
    proxy_buffering off;
    proxy_read_timeout 300s;

    location / {
        proxy_pass http://radonaix_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
